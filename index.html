<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KIRO</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <p class="japones">
        おかえり、Thayná。
    </p>

    <h1>KIRO</h1>

    <p class="subtitulo">
        Bem-vinda de volta.
    </p>

    <p class="frase">
        Cada real guardado é um passo em direção a Izumo.
    </p>

    <div class="card">

        <span>💰 Guardado</span>

        <h2 id="saldo">
            R$ 0,00
        </h2>

    </div>

    <div class="card">

        <span>📍 Distância percorrida</span>

        <h2 id="distancia">
            0 km
        </h2>

    </div>

    <div class="card">

        <span>🎯 Meta</span>

        <div class="barra">

            <div class="progresso"></div>

        </div>

        <p id="porcentagem">
            0%
        </p>

    </div>

    <button class="verde">

        🌸 Comprar mais um pedaço da viagem

    </button>

    <button class="rosa">

        ➖ Retirar dinheiro

    </button>

</div>

<script src="app.js"></script>

</body>
</html>
