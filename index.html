<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KIRO</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<main class="app">

<header>

<p class="jp">おかえり、Thayná。</p>

<h1>KIRO</h1>

<p class="subtitle">Bem-vinda de volta.</p>

<p class="phrase">
Cada real guardado é um passo em direção a Izumo.
</p>

</header>

<section class="card saldo">

<span>💰 Guardado</span>

<h2 id="saldo">R$ 0,00</h2>

</section>

<section class="cards">

<div class="mini">

<span>📍 Percorrido</span>

<h3 id="distancia">0 km</h3>

</div>

<div class="mini">

<span>⛩️ Restam</span>

<h3 id="restante">18.700 km</h3>

</div>

</section>

<section class="card">

<span>🎯 Meta</span>

<div class="progress">

<div class="progress-bar" id="barra"></div>

</div>

<p id="porcentagem">0%</p>

</section>

<div class="buttons">

<button id="depositar">

🌸 Comprar mais um pedaço da viagem

</button>

<button id="retirar">

➖ Retirar dinheiro

</button>

</div>

</main>

<script src="assets/js/app.js"></script>

</body>

</html>
