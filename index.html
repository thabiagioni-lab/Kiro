<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>KIRO • Japão</title>

    <!-- Fontes -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;600&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="assets/css/style.css">

</head>

<body>

    <!-- Pétalas -->

    <div id="petals-container"></div>

    <!-- Fundo -->

    <div class="background-blur"></div>

    <main class="container">

        <!-- Cabeçalho -->

        <section class="hero">

            <p class="jp-text">
                おかえり、Thayná。
            </p>

            <h1>KIRO</h1>

            <p class="subtitle">
                Cada real guardado é um passo em direção a Izumo.
            </p>

        </section>

        <!-- Card principal -->

        <section class="glass-card">

            <div class="info-grid">

                <div class="info-item">

                    <span class="label">
                        Saldo
                    </span>

                    <h2 id="saldo">
                        R$ 0,00
                    </h2>

                </div>

                <div class="info-item">

                    <span class="label">
                        Km percorridos
                    </span>

                    <h2 id="kmPercorridos">
                        0 km
                    </h2>

                </div>

                <div class="info-item">

                    <span class="label">
                        Km restantes
                    </span>

                    <h2 id="kmRestantes">
                        18.500 km
                    </h2>

                </div>

            </div>

            <!-- Barra -->

            <div class="progress-section">

                <div class="progress-header">

                    <span>Progresso</span>

                    <span id="porcentagem">
                        0%
                    </span>

                </div>

                <div class="progress-bar">

                    <div id="progressFill"
                         class="progress-fill"></div>

                </div>

            </div>

        </section>

        <!-- Botões -->

        <section class="buttons">

            <button id="btnAdicionar"
                    class="primary-btn">

                🌸 Comprar mais um pedaço da viagem

            </button>

            <button id="btnRetirar"
                    class="secondary-btn">

                ➖ Retirar dinheiro

            </button>

        </section>
        <!-- Modal -->

        <div id="modal" class="modal">

            <div class="modal-card">

                <h2 id="modalTitulo">
                    Adicionar dinheiro
                </h2>

                <p id="modalDescricao">
                    Quanto deseja guardar hoje?
                </p>

                <input
                    id="valorInput"
                    type="number"
                    inputmode="decimal"
                    min="0"
                    step="0.01"
                    placeholder="R$ 0,00"
                    autocomplete="off">

                <div class="modal-buttons">

                    <button
                        id="cancelar"
                        type="button">

                        Cancelar

                    </button>

                    <button
                        id="salvar"
                        type="button">

                        Salvar

                    </button>

                </div>

            </div>

        </div>

    </main>

    <!-- JavaScript -->

    <script src="assets/js/app.js"></script>

</body>

</html>
