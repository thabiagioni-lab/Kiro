<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KIRO</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Fundo -->
    <div class="background"></div>

    <!-- Aplicativo -->
    <main class="app">

        <!-- Cabeçalho -->
        <header>

            <p class="jp">
                おかえり、Thayná。
            </p>

            <h1>KIRO</h1>

            <p class="subtitle">
                Bem-vinda de volta.
            </p>

            <p class="phrase">
                Cada real guardado é um passo em direção a Izumo.
            </p>

        </header>

        <!-- Saldo -->
        <section class="card">

            <span class="label">
                💰 Guardado
            </span>

            <h2 id="saldo">
                R$ 0,00
            </h2>

        </section>

        <!-- Quilômetros -->
        <section class="cards">

            <article class="mini-card">

                <span class="label">
                    📍 Percorrido
                </span>

                <h3 id="kmPercorridos">
                    0 km
                </h3>

            </article>

            <article class="mini-card">

                <span class="label">
                    ⛩️ Restam
                </span>

                <h3 id="kmRestantes">
                    18.700 km
                </h3>

            </article>

        </section>

        <!-- Progresso -->
        <section class="card">

            <span class="label">
                🎯 Meta da viagem
            </span>

            <div class="progress">

                <div id="progressFill" class="progress-fill"></div>

            </div>

            <p id="percentual">
                0%
            </p>

        </section>

        <!-- Botões -->
        <section class="buttons">

            <button id="btnAdicionar" class="btn primary">

                🌸 Comprar mais um pedaço da viagem

            </button>

            <button id="btnRetirar" class="btn secondary">

                ➖ Retirar dinheiro

            </button>

        </section>

    </main>

    <!-- Modal -->

    <div id="modal" class="modal hidden">

        <div class="modal-content">

            <h2>
                🌸 Comprar mais um pedaço da viagem
            </h2>

            <label for="valorInput">
                Valor
            </label>

            <input
                id="valorInput"
                type="number"
                step="0.01"
                placeholder="100,00">

            <div class="modal-buttons">

                <button id="btnCancelar" class="btn secondary">
                    Cancelar
                </button>

                <button id="btnSalvar" class="btn primary">
                    Salvar 🌸
                </button>

            </div>

        </div>

    </div>

    <script src="assets/js/app.js"></script>

</body>

</html>
